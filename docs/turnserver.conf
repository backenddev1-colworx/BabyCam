# coturn config for BabyCam — self-hosted TURN on Oracle Always Free.
# Replace the two IP placeholders, set a strong password, then:
#   sudo cp turnserver.conf /etc/turnserver.conf
#   sudo systemctl restart coturn
#
# Find the IPs on the VM:
#   PUBLIC_IP:  curl -s ifconfig.me
#   PRIVATE_IP: ip -4 addr show | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | grep -v 127.0.0.1

# --- listening ---
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# --- NAT mapping (CRITICAL on cloud VMs) ---
# The VM sees only its PRIVATE ip; clients must be told the PUBLIC ip.
# Format: external-ip=PUBLIC/PRIVATE
external-ip=PUBLIC_IP/PRIVATE_IP
relay-ip=PRIVATE_IP

# --- relay port range (must be open in BOTH firewalls) ---
min-port=49152
max-port=65535

# --- authentication: long-term static credential (simple, client-embeddable) ---
lt-cred-mech
realm=babycam
user=babycam:CHANGE_ME_STRONG_PASSWORD

# --- hardening ---
no-multicast-peers
no-cli
# Block relaying to private ranges so the server can't be abused as an internal proxy.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
allowed-peer-ip=0.0.0.0-9.255.255.255

# --- TLS (turns:) — enable later after you add a domain + Let's Encrypt cert ---
# cert=/etc/letsencrypt/live/turn.YOURDOMAIN/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.YOURDOMAIN/privkey.pem
# Until then we run TURN without TLS:
no-tls
no-dtls

# --- logging ---
log-file=/var/log/turnserver.log
simple-log
